<!-- popup/popup.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>自动划词翻译</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">自动划词翻译</h1>
      <div class="header-actions">
        <button id="settings-btn" class="icon-btn" title="设置">
          &#9881;
        </button>
      </div>
    </header>

    <main class="main-content">
      <div class="language-selector">
        <div class="language-group">
          <label for="source-lang">源语言</label>
          <select id="source-lang" class="language-select">
            <option value="auto">自动检测</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="ru">俄语</option>
          </select>
        </div>
        <div class="arrow">&rarr;</div>
        <div class="language-group">
          <label for="target-lang">目标语言</label>
          <select id="target-lang" class="language-select">
            <option value="zh">中文</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
            <option value="es">西班牙语</option>
            <option value="ru">俄语</option>
          </select>
        </div>
      </div>

      <div class="translation-section">
        <div class="section original-section">
          <div class="section-header">
            <h3>原文</h3>
            <button id="clear-original" class="text-btn">清空</button>
          </div>
          <textarea id="original-text" class="text-area original-text"
                    placeholder="在这里粘贴或输入要翻译的文本..."
                    rows="4"></textarea>
          <div class="char-count">
            <span id="original-char-count">0</span> 字符
          </div>
        </div>

        <div class="section translated-section">
          <div class="section-header">
            <h3>翻译结果</h3>
            <div class="action-buttons">
              <button id="copy-translation" class="icon-btn small" title="复制">&#128203;</button>
              <button id="speak-translation" class="icon-btn small" title="发音">&#128266;</button>
            </div>
          </div>
          <div id="translated-text" class="text-area translated-text"
               contenteditable="false">
            <div class="placeholder">翻译结果将显示在这里...</div>
          </div>
          <div class="translation-info">
            <span id="translation-status">就绪</span>
            <span id="translation-time" class="time-info"></span>
          </div>
        </div>
      </div>

      <div class="controls">
        <button id="translate-btn" class="primary-btn">
          <span class="btn-icon">&#127760;</span>
          翻译
        </button>
        <button id="swap-languages" class="secondary-btn" title="交换语言">
          &#8644; 交换
        </button>
      </div>

      <div class="quick-settings">
        <div class="setting-item">
          <label class="switch">
            <input type="checkbox" id="auto-translate-toggle">
            <span class="slider"></span>
          </label>
          <span class="setting-label">启用自动划词翻译</span>
        </div>
        <div class="setting-item">
          <label class="switch">
            <input type="checkbox" id="show-popup-toggle">
            <span class="slider"></span>
          </label>
          <span class="setting-label">显示翻译弹窗</span>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="status" id="api-status">
        <span class="status-dot"></span>
        <span class="status-text">API连接正常</span>
      </div>
      <a href="#" id="view-history" class="footer-link">查看历史</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
