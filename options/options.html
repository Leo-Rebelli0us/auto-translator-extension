<!-- options/options.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>自动划词翻译 - 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    header {
      padding: 24px;
      background: linear-gradient(135deg, #4caf50, #2e7d32);
      color: white;
    }

    .header-content {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .app-icon {
      font-size: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.9;
    }

    main {
      padding: 0;
    }

    .settings-group {
      margin-bottom: 32px;
    }

    .group-header {
      padding: 20px 24px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
    }

    .group-header h2 {
      font-size: 18px;
      font-weight: 600;
      color: #333;
    }

    .group-description {
      font-size: 13px;
      color: #666;
      margin-top: 4px;
    }

    .settings-list {
      padding: 24px;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .setting-item:last-child {
      border-bottom: none;
    }

    .setting-info {
      flex: 1;
    }

    .setting-label {
      display: block;
      font-weight: 500;
      margin-bottom: 4px;
      color: #333;
    }

    .setting-description {
      font-size: 13px;
      color: #666;
      line-height: 1.4;
    }

    .setting-control {
      margin-left: 16px;
    }

    input[type="text"],
    input[type="password"],
    input[type="url"],
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border 0.2s;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #4caf50;
      box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #4caf50;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .form-group {
      flex: 1;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .actions {
      padding: 24px;
      background: #f8f9fa;
      border-top: 1px solid #e9ecef;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-message {
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 4px;
      display: none;
    }

    .status-message.success {
      background: #e8f5e9;
      color: #2e7d32;
      display: block;
    }

    .status-message.error {
      background: #ffebee;
      color: #f44336;
      display: block;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .primary-btn {
      background: #4caf50;
      color: white;
    }

    .primary-btn:hover {
      background: #43a047;
    }

    .secondary-btn {
      background: #e0e0e0;
      color: #333;
    }

    .secondary-btn:hover {
      background: #d0d0d0;
    }

    .test-btn {
      margin-top: 8px;
      padding: 8px 16px;
      background: #2196f3;
      color: white;
      border-radius: 4px;
      font-size: 13px;
    }

    .test-btn:hover {
      background: #1e88e5;
    }

    .api-status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.online {
      background: #4caf50;
    }

    .status-dot.offline {
      background: #f44336;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <div class="app-icon">&#127760;</div>
        <div>
          <h1>自动划词翻译设置</h1>
          <p class="subtitle">配置您的翻译插件体验</p>
        </div>
      </div>
    </header>

    <main>
      <form id="settings-form">
        <div class="settings-group">
          <div class="group-header">
            <h2>翻译服务</h2>
            <p class="group-description">配置翻译API和语言设置</p>
          </div>

          <div class="settings-list">
            <div class="form-row">
              <div class="form-group">
                <label for="api-service">翻译服务</label>
                <select id="api-service" name="apiService">
                  <option value="libretranslate">LibreTranslate (免费)</option>
                  <option value="google">Google Translate</option>
                  <option value="deepl">DeepL</option>
                </select>
              </div>

              <div class="form-group">
                <label for="target-language">目标语言</label>
                <select id="target-language" name="targetLanguage">
                  <option value="zh">中文</option>
                  <option value="en">英语</option>
                  <option value="ja">日语</option>
                  <option value="ko">韩语</option>
                  <option value="fr">法语</option>
                  <option value="de">德语</option>
                  <option value="es">西班牙语</option>
                  <option value="ru">俄语</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="api-endpoint">API端点</label>
                <input type="url" id="api-endpoint" name="apiEndpoint"
                       placeholder="https://libretranslate.com/translate">
              </div>

              <div class="form-group">
                <label for="api-key">API密钥 (可选)</label>
                <input type="password" id="api-key" name="apiKey"
                       placeholder="输入您的API密钥">
              </div>
            </div>

            <div class="form-group">
              <button type="button" id="test-api-btn" class="test-btn">
                测试API连接
              </button>
              <div id="api-status" class="api-status" style="display: none;">
                <span class="status-dot"></span>
                <span class="status-text">测试中...</span>
              </div>
            </div>
          </div>
        </div>

        <div class="settings-group">
          <div class="group-header">
            <h2>功能设置</h2>
            <p class="group-description">控制插件的核心功能行为</p>
          </div>

          <div class="settings-list">
            <div class="setting-item">
              <div class="setting-info">
                <span class="setting-label">启用自动划词翻译</span>
                <span class="setting-description">当在网页上选择文本时自动触发翻译</span>
              </div>
              <div class="setting-control">
                <label class="switch">
                  <input type="checkbox" id="auto-translate" name="autoTranslateEnabled">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

            <div class="setting-item">
              <div class="setting-info">
                <span class="setting-label">显示翻译弹窗</span>
                <span class="setting-description">在选中文本附近显示翻译结果弹窗</span>
              </div>
              <div class="setting-control">
                <label class="switch">
                  <input type="checkbox" id="show-popup" name="showPopup">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

            <div class="setting-item">
              <div class="setting-info">
                <span class="setting-label">启用缓存</span>
                <span class="setting-description">缓存翻译结果以提高性能</span>
              </div>
              <div class="setting-control">
                <label class="switch">
                  <input type="checkbox" id="cache-enabled" name="cacheEnabled">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

            <div class="setting-item">
              <div class="setting-info">
                <span class="setting-label">启用右键菜单</span>
                <span class="setting-description">在右键菜单中添加"翻译选中文本"选项</span>
              </div>
              <div class="setting-control">
                <label class="switch">
                  <input type="checkbox" id="context-menu-enabled" name="contextMenuEnabled">
                  <span class="slider"></span>
                </label>
              </div>
            </div>

            <div class="setting-item">
              <div class="setting-info">
                <span class="setting-label">启用快捷键</span>
                <span class="setting-description">使用Ctrl+Shift+T打开翻译插件</span>
              </div>
              <div class="setting-control">
                <label class="switch">
                  <input type="checkbox" id="shortcuts-enabled" name="shortcutsEnabled">
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <div class="settings-group">
          <div class="group-header">
            <h2>高级设置</h2>
            <p class="group-description">高级功能配置</p>
          </div>

          <div class="settings-list">
            <div class="form-row">
              <div class="form-group">
                <label for="debounce-delay">防抖延迟 (毫秒)</label>
                <input type="number" id="debounce-delay" name="debounceDelay"
                       min="100" max="1000" step="100" value="300">
                <span class="setting-description">文本选择检测的防抖延迟时间</span>
              </div>

              <div class="form-group">
                <label for="cache-size">缓存大小 (条)</label>
                <input type="number" id="cache-size" name="cacheSize"
                       min="10" max="500" step="10" value="100">
                <span class="setting-description">最大缓存翻译记录数量</span>
              </div>
            </div>
          </div>
        </div>
      </form>
    </main>

    <div class="actions">
      <div>
        <div id="status-message" class="status-message"></div>
      </div>

      <div style="display: flex; gap: 12px;">
        <button type="button" id="reset-btn" class="secondary-btn">
          恢复默认
        </button>
        <button type="button" id="save-btn" class="primary-btn">
          保存设置
        </button>
      </div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
